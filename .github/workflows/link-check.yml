name: link-check

on:
  schedule:
    # Daily at 12:00 UTC — reachability sentinel for live/frozen entries.
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan alerts without opening/closing issues"
        type: boolean
        default: false

# Needed so the alert step can open, update, and close issues.
permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Probe canonical URLs
        # check_links.py exits non-zero when an entry is unreachable; tee keeps the
        # step green so the alert step below always runs on the captured report.
        run: python scripts/check_links.py --json | tee link-check-report.json
      - name: Open or refresh dead-link alerts
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/alert_on_dead_links.py \
            --report link-check-report.json \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: link-check-report.json
